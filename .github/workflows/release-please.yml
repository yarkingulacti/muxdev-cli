name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate SemVer tag
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          if ! [[ "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta|rc)(\.[0-9]+)?)?$ ]]; then
            echo "Invalid semver tag: $TAG"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Verify tag commit is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor HEAD origin/master

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Prepare release notes
        run: |
          chmod +x scripts/release-notes.sh
          ./scripts/release-notes.sh "${{ needs.release-please.outputs.tag_name }}" > release-notes.md
          echo "Release notes:" >> "$GITHUB_STEP_SUMMARY"
          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes-file=release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Upload to Nexus
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
          NEXUS_AUTH: ${{ secrets.NEXUS_AUTH }}
          NEXUS_CHANNEL: stable
          DIST_DIR: dist
        run: |
          if [ -z "${NEXUS_URL:-}" ] || [ -z "${NEXUS_AUTH:-}" ]; then
            echo "::error::Set GitHub secrets NEXUS_URL and NEXUS_AUTH before tagging a release"
            exit 1
          fi
          NEXUS_REPO="${NEXUS_REPO:-muxdev-releases}"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          chmod +x scripts/upload-nexus.sh scripts/verify-nexus.sh
          ./scripts/upload-nexus.sh "$TAG"
          ./scripts/verify-nexus.sh
          UPDATE_URL="${NEXUS_URL%/}/repository/${NEXUS_REPO}/${NEXUS_CHANNEL}/latest.json"
          {
            echo "## Nexus update"
            echo ""
            echo "Self-update manifest published:"
            echo "\`$UPDATE_URL\`"
            echo ""
            echo '```bash'
            echo "export MUXDEV_UPDATE_URL=\"$UPDATE_URL\""
            echo "muxdev update --check"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
