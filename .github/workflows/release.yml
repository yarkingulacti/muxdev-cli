# Release publishing moved to release-please.yml (runs after Release Please creates the tag).
# This file is kept for manual recovery only.

name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to publish (must exist on master)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-manual-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SemVer tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if ! [[ "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-(alpha|beta|rc)(\.[0-9]+)?)?$ ]]; then
            echo "Invalid semver tag: $TAG"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}
          fetch-depth: 0

      - name: Verify tag commit is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor HEAD origin/master

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Prepare release notes
        run: |
          chmod +x scripts/release-notes.sh
          ./scripts/release-notes.sh "${{ github.event.inputs.tag }}" > release-notes.md

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes-file=release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Upload to Nexus
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
          NEXUS_AUTH: ${{ secrets.NEXUS_AUTH }}
          NEXUS_CHANNEL: stable
          DIST_DIR: dist
        run: |
          if [ -z "${NEXUS_URL:-}" ] || [ -z "${NEXUS_AUTH:-}" ]; then
            echo "::error::Set GitHub secrets NEXUS_URL and NEXUS_AUTH"
            exit 1
          fi
          NEXUS_REPO="${NEXUS_REPO:-muxdev-releases}"
          TAG="${{ github.event.inputs.tag }}"
          chmod +x scripts/upload-nexus.sh scripts/verify-nexus.sh
          ./scripts/upload-nexus.sh "$TAG"
          ./scripts/verify-nexus.sh
