name: Nexus

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v1.0.0)
        required: true
        type: string
      verify_only:
        description: Skip build/upload; only verify latest.json
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    name: offline nexus tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Nexus automation tests
        run: |
          chmod +x scripts/*.sh scripts/nexus-manifest.py
          ./scripts/test-nexus.sh

  publish:
    name: publish to Nexus
    if: inputs.verify_only != true
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Goreleaser
        run: |
          go install github.com/goreleaser/goreleaser/v2@latest
          echo "GORELEASER=$(go env GOPATH)/bin/goreleaser" >> "$GITHUB_ENV"

      - name: Publish and verify
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
          NEXUS_AUTH: ${{ secrets.NEXUS_AUTH }}
        run: |
          if [ -z "${NEXUS_URL:-}" ] || [ -z "${NEXUS_AUTH:-}" ]; then
            echo "NEXUS_URL and NEXUS_AUTH secrets are required for publish"
            exit 1
          fi
          chmod +x scripts/*.sh
          ./scripts/release-nexus.sh "${{ inputs.tag }}"

  verify:
    name: verify Nexus latest
    if: inputs.verify_only == true
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Verify remote manifest
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
          NEXUS_AUTH: ${{ secrets.NEXUS_AUTH }}
        run: |
          if [ -z "${NEXUS_URL:-}" ]; then
            echo "NEXUS_URL secret is required"
            exit 1
          fi
          chmod +x scripts/verify-nexus.sh
          ./scripts/verify-nexus.sh
