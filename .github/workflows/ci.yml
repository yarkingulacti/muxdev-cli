name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Nexus automation tests
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/*.sh scripts/nexus-manifest.py
          ./scripts/test-nexus.sh

      - name: install.sh resolves latest release
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/install.sh
          CHECK_ONLY=1 ./scripts/install.sh

      - name: Build
        run: go build -o muxdev${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/muxdev

      - name: Smoke test
        shell: bash
        run: |
          ./muxdev${{ matrix.os == 'windows-latest' && '.exe' || '' }} --version
          ./muxdev${{ matrix.os == 'windows-latest' && '.exe' || '' }} list --config testdata/muxdev.yaml
