name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o muxdev${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/muxdev

      - name: Smoke test
        shell: bash
        run: |
          ./muxdev${{ matrix.os == 'windows-latest' && '.exe' || '' }} --version
          ./muxdev${{ matrix.os == 'windows-latest' && '.exe' || '' }} --list --config testdata/muxdev.yaml
