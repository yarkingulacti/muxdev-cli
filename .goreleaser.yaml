version: 2

project_name: muxdev

before:
  hooks:
    - go mod tidy

builds:
  - id: muxdev
    main: ./cmd/muxdev
    binary: muxdev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/yarkingulacti/muxdev-cli/internal/version.Version={{.Version}}
      - -X github.com/yarkingulacti/muxdev-cli/internal/version.Commit={{.Commit}}
      - -X github.com/yarkingulacti/muxdev-cli/internal/version.Date={{.Date}}
      - -X github.com/yarkingulacti/muxdev-cli/internal/version.InstallMethod=direct

archives:
  - id: default
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

brews:
  - name: muxdev
    repository:
      owner: yarkingulacti
      name: homebrew-tap
      branch: master
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/yarkingulacti/muxdev-cli
    description: Multiplexed dev stack runner
    license: MIT
    test: system "#{bin}/muxdev version --short"
    install: |
      bin.install "muxdev"
    commit_author:
      name: goreleaser
      email: goreleaser@carlosbecker.com

scoops:
  - name: muxdev
    repository:
      owner: yarkingulacti
      name: scoop-bucket
      branch: master
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/yarkingulacti/muxdev-cli
    description: Multiplexed dev stack runner
    license: MIT
    directory: bucket

release:
  github:
    owner: yarkingulacti
    name: muxdev-cli
  draft: false
  prerelease: auto
  mode: keep-existing
